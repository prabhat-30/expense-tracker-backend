# =========================================================================
# CLUSTER PERSISTENCE CONNECTION INFRASTRUCTURE (DATABASE SETTINGS)
# =========================================================================
# Locally defaults to localhost, but switches to cloud string dynamically using environment variables
spring.datasource.url=${{SPRING_DATASOURCE_URL}}
spring.datasource.username=${{SPRING_DATASOURCE_USERNAME}}
spring.datasource.password=${{SPRING_DATASOURCE_PASSWORD}}

# =========================================================================
# APPLICATION ROUTING
# =========================================================================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# ? OPTIMIZED: Turned OFF for production to save cloud log storage space and boost I/O performance
spring.jpa.show-sql=false
spring.main.lazy-initialization=true
# =========================================================================
# CORE SECURITY ENVIRONMENT TRACKING REGISTRIES
# =========================================================================
# Add this token registration wrapper to prevent token verification context drops
app.security.jwt.secret=${APP_JWT_SECRET:aSecureMinimum32BitLongSecretKeyForDevelopmentOnly12345!}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://trackwithme.vercel.app}

# =========================================================================
# WEB ERROR VIEWPORT FILTER CONFIGURATIONS
# =========================================================================
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never

